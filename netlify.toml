# Netlify Configuration for Flutter Web Deployment
# Pre-built Flutter web app - no build command needed
# The build/web directory is committed to GitHub and served directly

[build]
  publish = "build/web"
  command = "echo 'Using pre-built Flutter web app'"

# Redirect all routes to index.html for Flutter routing to work
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Enable caching for static assets
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache control for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.wasm"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

name: ai_finance_platform
description: "Multi-Agent AI-Based Personal Finance Optimization Platform - A professional Flutter application for smart financial planning."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.15.0
  firebase_auth: ^5.6.0
  firebase_database: ^11.0.0
  firebase_messaging: ^15.0.0
  firebase_storage: ^12.1.0
  
  # State Management
  provider: ^6.1.0
  
  # HTTP & API
  http: ^1.1.0
  
  # Charts
  fl_chart: ^0.65.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  
  # Environment variables
  flutter_dotenv: ^5.1.0
  
  # JSON serialization
  json_annotation: ^4.8.1
  
  # UI Components
  material_design_icons_flutter: ^7.0.7296
  animated_splash_screen: ^1.3.0
  shimmer: ^3.0.0
  intl: ^0.20.0
  
  # Utilities
  uuid: ^4.0.0
  logger: ^2.1.0
  get_it: ^7.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/.env
  
  # Fonts disabled - create these directories and files if needed
  # fonts:
